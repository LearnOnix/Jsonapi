<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anime JSON Search</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="container">

    <h1>ANIME DATA SEARCH</h1>

    <input
        type="file"
        id="fileInput"
        accept=".json"
    >

    <div class="searchBox">

        <input
            id="searchInput"
            placeholder="Search by ID or Username..."
        >

        <button id="searchBtn">
            Search
        </button>

    </div>

    <div id="result"></div>

</div>

<script src="script.js"></script>
</body>
</html>
