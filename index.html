<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV to JSON Converter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.upload-box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input[type=file]{
    width:100%;
    padding:12px;
    background:white;
    color:black;
    border-radius:8px;
}

.btn{
    border:none;
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
}

.btn:hover{
    background:#1d4ed8;
}

.stats{
    margin-top:15px;
    font-size:14px;
}

textarea{
    width:100%;
    height:500px;
    background:#020617;
    color:#00ff88;
    border:1px solid #334155;
    border-radius:10px;
    padding:15px;
    resize:vertical;
}

.download{
    display:none;
}
</style>
</head>
<body>

<div class="container">

<h1>CSV/TXT → JSON Converter</h1>

<div class="upload-box">

<input type="file" id="fileInput" accept=".csv,.txt">

<button class="btn" onclick="convertFile()">
Convert To JSON
</button>

<button class="btn download" id="downloadBtn">
Download JSON
</button>

<div class="stats" id="stats"></div>

</div>

<textarea id="output" placeholder="JSON output here..."></textarea>

</div>

<script>

let finalJson = [];

async function convertFile(){

    const file =
    document.getElementById("fileInput").files[0];

    if(!file){
        alert("Select a file first");
        return;
    }

    const text = await file.text();

    const lines = text
        .split(/\r?\n/)
        .filter(line => line.trim() !== "");

    if(lines.length < 2){
        alert("Invalid file");
        return;
    }

    const headers = lines[0]
        .split(";;")
        .map(h => h.trim());

    const result = [];

    for(let i=1;i<lines.length;i++){

        const row = lines[i]
            .split(";;");

        const obj = {};

        headers.forEach((header,index)=>{

            let value = row[index];

            if(value === undefined)
                value = null;

            if(value !== null)
                value = value.trim();

            if(value === "" || value === "None")
                value = null;

            obj[header] = value;
        });

        result.push(obj);
    }

    finalJson = result;

    document.getElementById("output").value =
        JSON.stringify(result,null,2);

    document.getElementById("stats").innerHTML =
        `
        Records: ${result.length}<br>
        Headers: ${headers.length}<br>
        JSON Size: ${(JSON.stringify(result).length/1024).toFixed(2)} KB
        `;

    document.getElementById("downloadBtn")
        .style.display = "inline-block";
}

document.getElementById("downloadBtn")
.addEventListener("click",()=>{

    const blob = new Blob(
        [JSON.stringify(finalJson,null,2)],
        {type:"application/json"}
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = "converted_data.json";

    a.click();

    URL.revokeObjectURL(url);
});

</script>

</body>
</html>
